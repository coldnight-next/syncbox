appId: com.syncbox.app
productName: Syncbox
copyright: Copyright © 2026 Syncbox
asar: true
npmRebuild: true

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - "!out/**/*.map"

extraMetadata:
  main: ./out/main/index.js

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: msi
      arch:
        - x64
  artifactName: "${productName}-${version}-${arch}-setup.${ext}"
  # Code signing — electron-builder picks up the certificate automatically
  # from these environment variables:
  #   CSC_LINK     — path to .pfx file OR base64-encoded .pfx (for CI)
  #   CSC_KEY_PASSWORD — password for the .pfx
  # For EV certificates on a hardware token (e.g. SafeNet/YubiKey):
  #   WIN_CSC_LINK is NOT needed — signtool finds the cert on the token
  #   Set signtoolOptions below instead
  signtoolOptions:
    publisherName: Syncbox
    # Dual-sign with SHA-256 for modern Windows + SHA-1 for older
    sign: null
    signingHashAlgorithms:
      - sha256
    # RFC 3161 timestamp so signatures stay valid after cert expires
    rfc3161TimeStampServer: http://timestamp.digicert.com

nsis:
  oneClick: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Syncbox
  runAfterFinish: true
  perMachine: false
  allowElevation: true
  deleteAppDataOnUninstall: false
  include: build/installer.nsh

msi:
  oneClick: false
  perMachine: true
  runAfterFinish: false

publish:
  provider: github
  owner: coldnight-next
  repo: syncbox
  releaseType: release

protocols:
  name: Syncbox
  schemes:
    - syncbox
